<div class="my-5">
      
  <div class="row align-items-center text-center text-md-start mb-4">

    <!-- Title -->
    <div class="col-12 col-md-4">
      <h2 class="fw-semibold fs-4 mb-2 mb-md-0">
        Estatus del Objeto
      </h2>
    </div>

    <!-- Description -->
    <div class="col-12 col-md-8">
      <p class="text mb-0 mx-auto mx-md-0" style="max-width: 500px;">
        Define el estado actual del objeto dentro del sistema y si su diligenciamiento es obligatorio para el proceso.
      </p>
    </div>

  </div>
  
  <div class="border rounded-4 p-4 bg-white mb-4">
    <div class="row g-3">
      {% for badge in status_badges %}
        <div class="col-md-4">
          <div class="text-muted fw-semibold mb-1">{{ badge.label }}</div>
          <span class="badge rounded-pill {{ badge.badge_class }} px-3 py-2">
            {{ badge.value }}
          </span>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
